<div class="main">
  <h1>Matheus Cavalcanti | 255419</h1>
  <h1>Giovani Steiger | 255189</h1>
  <input class="lg-text-input" #campoNovoItem />
  <button class="btn-primary" (click)="CREATE_tarefa(campoNovoItem.value)">
    Adicionar Tarefa</button>
  <ul>
    <li *ngFor="let tarefaDoLoop of arrayDeTarefas()">
      <app-item [tarefa]="tarefaDoLoop" (remover)="DELETE_tarefas($event)" (modificaTarefa)="UPDATE_tarefa(tarefaDoLoop)"></app-item>
    </li>
  </ul>
</div>
